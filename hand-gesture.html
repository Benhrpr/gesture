<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand Gesture Recogniser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --accent: #00ff88;
      --accent2: #00cc66;
      --text: #f0f0f0;
      --muted: #666;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      width: 100%;
      max-width: 600px;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .logo {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    .hero {
      width: 100%;
      max-width: 600px;
      margin-bottom: 1.5rem;
    }

    .camera-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    video { display: none; }

    .camera-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--surface);
      transition: opacity 0.3s;
    }

    .camera-overlay.hidden { opacity: 0; pointer-events: none; }

    .camera-overlay-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .camera-overlay p {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      max-width: 200px;
      line-height: 1.6;
    }

    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.5;
    }
    .corner.tl { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
    .corner.tr { top: 10px; right: 10px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 10px; left: 10px; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

    .live-dot {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .live-dot.visible {
      opacity: 1;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .gesture-panel {
      width: 100%;
      max-width: 600px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: start;
    }

    .gesture-main {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
    }

    .gesture-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .gesture-name {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
      transition: color 0.2s;
    }

    .gesture-name.active { color: var(--accent); }

    .gesture-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .conf-track {
      height: 2px;
      background: var(--border);
      border-radius: 99px;
      margin-top: 16px;
      overflow: hidden;
    }

    .conf-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      width: 0%;
      transition: width 0.15s ease;
    }

    .conf-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
    }

    .emoji-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      line-height: 1;
      min-width: 90px;
      aspect-ratio: 1;
    }

    .controls {
      width: 100%;
      max-width: 600px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 1rem;
    }

    button {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 12px 20px;
      border-radius: 4px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
    }

    #startBtn {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    #startBtn:hover { background: var(--accent2); border-color: var(--accent2); }

    #stopBtn {
      background: transparent;
      color: var(--muted);
    }

    #stopBtn:hover { background: var(--surface2); color: var(--text); }

    .gesture-grid {
      width: 100%;
      max-width: 600px;
      margin-top: 2rem;
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 6px 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      transition: border-color 0.2s, color 0.2s;
    }

    .chip.detected {
      border-color: var(--accent);
      color: var(--accent);
    }

    .chip-emoji { font-size: 14px; }

    .status-bar {
      width: 100%;
      max-width: 600px;
      margin-top: 1rem;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .status-indicator.ok { background: var(--accent); }
    .status-indicator.err { background: #ff4444; }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Gesture<span>.</span></h1>
      <p class="subtitle">// neural network · mediapipe hands · real-time</p>
    </div>
    <span class="logo">v1.0</span>
  </header>

  <div class="hero">
    <div class="camera-wrapper">
      <video id="video" autoplay playsinline muted width="640" height="480"></video>
      <canvas id="canvas" width="640" height="480"></canvas>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="live-dot" id="liveDot"></div>
      <div class="camera-overlay" id="overlay">
        <div class="camera-overlay-icon">✋</div>
        <p>Click "Start Camera" below to begin gesture recognition</p>
      </div>
    </div>
  </div>

  <div class="gesture-panel">
    <div class="gesture-main">
      <div class="gesture-label">detected gesture</div>
      <div class="gesture-name" id="gestureName">Waiting...</div>
      <div class="gesture-sub" id="gestureSub">Start the camera to begin</div>
      <div class="conf-track">
        <div class="conf-fill" id="confBar"></div>
      </div>
      <div class="conf-label">
        <span>confidence</span>
        <span id="confPct">—</span>
      </div>
    </div>
    <div class="emoji-box" id="gestureEmoji">✋</div>
  </div>

  <div class="controls">
    <button id="startBtn">Start Camera</button>
    <button id="stopBtn">Stop</button>
  </div>

  <div class="gesture-grid">
    <div class="section-label">recognisable gestures</div>
    <div class="chips" id="chipsContainer"></div>
  </div>

  <div class="status-bar">
    <div class="status-indicator" id="statusDot"></div>
    <span id="statusText">Ready — click Start Camera to begin</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js"></script>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const gestureName = document.getElementById('gestureName');
    const gestureSub = document.getElementById('gestureSub');
    const gestureEmoji = document.getElementById('gestureEmoji');
    const confBar = document.getElementById('confBar');
    const confPct = document.getElementById('confPct');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const overlay = document.getElementById('overlay');
    const liveDot = document.getElementById('liveDot');
    const chipsContainer = document.getElementById('chipsContainer');

    const GESTURES = [
      { name: 'Open hand', emoji: '🖐️', sub: 'All five fingers extended' },
      { name: 'Fist', emoji: '✊', sub: 'All fingers closed' },
      { name: 'Thumbs up', emoji: '👍', sub: 'Thumb only extended' },
      { name: 'Pointing', emoji: '👆', sub: 'Index finger only' },
      { name: 'Peace', emoji: '✌️', sub: 'Index + middle extended' },
      { name: 'Rock on', emoji: '🤘', sub: 'Index + pinky extended' },
      { name: 'Four fingers', emoji: '🖖', sub: 'Four fingers, no thumb' },
      { name: 'Pinky', emoji: '🤙', sub: 'Pinky finger only' },
    ];

    GESTURES.forEach(g => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.id = 'chip-' + g.name.replace(/\s+/g, '-');
      chip.innerHTML = `<span class="chip-emoji">${g.emoji}</span><span>${g.name}</span>`;
      chipsContainer.appendChild(chip);
    });

    let detector = null;
    let stream = null;
    let running = false;
    let animId = null;
    let lastGesture = null;

    function fingersExtended(kp) {
      const ext = [];
      const wrist = kp[0];
      const thumbTip = kp[4];
      const thumbMcp = kp[2];
      const isRightHand = wrist.x < kp[5].x;
      ext.push(isRightHand ? thumbTip.x > thumbMcp.x : thumbTip.x < thumbMcp.x);
      for (let i = 1; i < 5; i++) {
        const tipIdx = [8, 12, 16, 20][i - 1];
        ext.push(kp[tipIdx].y < kp[tipIdx - 2].y);
      }
      return ext;
    }

    function classifyGesture(kp) {
      if (!kp || kp.length < 21) return null;
      const [thumb, index, middle, ring, pinky] = fingersExtended(kp);
      const count = [thumb, index, middle, ring, pinky].filter(Boolean).length;

      if (count === 5) return { name: 'Open hand', emoji: '🖐️', sub: 'All five fingers extended', conf: 0.97 };
      if (count === 0) return { name: 'Fist', emoji: '✊', sub: 'All fingers closed', conf: 0.95 };
      if (thumb && !index && !middle && !ring && !pinky) return { name: 'Thumbs up', emoji: '👍', sub: 'Thumb only extended', conf: 0.94 };
      if (!thumb && index && !middle && !ring && !pinky) return { name: 'Pointing', emoji: '👆', sub: 'Index finger only', conf: 0.93 };
      if (!thumb && index && middle && !ring && !pinky) return { name: 'Peace', emoji: '✌️', sub: 'Index + middle extended', conf: 0.92 };
      if (!thumb && index && !middle && !ring && pinky) return { name: 'Rock on', emoji: '🤘', sub: 'Index + pinky extended', conf: 0.91 };
      if (!thumb && index && middle && ring && pinky) return { name: 'Four fingers', emoji: '🖖', sub: 'Four fingers, no thumb', conf: 0.90 };
      if (!thumb && !index && !middle && !ring && pinky) return { name: 'Pinky', emoji: '🤙', sub: 'Pinky finger only', conf: 0.88 };
      return { name: `${count} fingers`, emoji: '✋', sub: 'Unrecognised gesture', conf: 0.60 };
    }

    function drawHand(kp) {
      const connections = [
        [0,1],[1,2],[2,3],[3,4],
        [0,5],[5,6],[6,7],[7,8],
        [5,9],[9,10],[10,11],[11,12],
        [9,13],[13,14],[14,15],[15,16],
        [13,17],[17,18],[18,19],[19,20],
        [0,17]
      ];

      const W = canvas.width;
      const mirror = p => ({ x: W - p.x, y: p.y });

      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = 2;
      for (const [a, b] of connections) {
        const p1 = mirror(kp[a]), p2 = mirror(kp[b]);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
      for (const p of kp) {
        const mp = mirror(p);
        ctx.beginPath();
        ctx.arc(mp.x, mp.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#0a0a0a';
        ctx.fill();
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    function highlightChip(name) {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('detected'));
      const chip = document.getElementById('chip-' + name.replace(/\s+/g, '-'));
      if (chip) chip.classList.add('detected');
    }

    async function detect() {
      if (!running) return;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      try {
        const hands = await detector.estimateHands(video);
        if (hands.length > 0) {
          const kp = hands[0].keypoints;
          drawHand(kp);
          const g = classifyGesture(kp);
          if (g) {
            if (g.name !== lastGesture) {
              gestureName.className = 'gesture-name active';
              setTimeout(() => gestureName.className = 'gesture-name', 300);
              lastGesture = g.name;
            }
            gestureName.textContent = g.name;
            gestureSub.textContent = g.sub;
            gestureEmoji.textContent = g.emoji;
            confBar.style.width = Math.round(g.conf * 100) + '%';
            confPct.textContent = Math.round(g.conf * 100) + '%';
            highlightChip(g.name);
          }
          statusText.textContent = `Tracking ${kp.length} landmarks · hand detected`;
          statusDot.className = 'status-indicator ok';
        } else {
          gestureName.textContent = 'No hand';
          gestureSub.textContent = 'Hold your hand up in front of the camera';
          gestureEmoji.textContent = '✋';
          confBar.style.width = '0%';
          confPct.textContent = '—';
          statusText.textContent = 'Searching for hand...';
          statusDot.className = 'status-indicator';
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('detected'));
          lastGesture = null;
        }
      } catch (e) {}
      animId = requestAnimationFrame(detect);
    }

    async function startCamera() {
      statusText.textContent = 'Requesting camera access...';
      statusDot.className = 'status-indicator';
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
        video.srcObject = stream;
        await new Promise(r => video.onloadeddata = r);

        statusText.textContent = 'Loading neural network model...';
        if (!detector) {
          const model = handPoseDetection.SupportedModels.MediaPipeHands;
          detector = await handPoseDetection.createDetector(model, {
            runtime: 'mediapipe',
            solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915',
            modelType: 'full'
          });
        }

        running = true;
        overlay.classList.add('hidden');
        liveDot.classList.add('visible');
        statusText.textContent = 'Running · show your hand to the camera';
        statusDot.className = 'status-indicator ok';
        detect();
      } catch (e) {
        statusText.textContent = 'Error: ' + e.message;
        statusDot.className = 'status-indicator err';
      }
    }

    function stopCamera() {
      running = false;
      if (animId) cancelAnimationFrame(animId);
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      overlay.classList.remove('hidden');
      liveDot.classList.remove('visible');
      gestureName.textContent = 'Stopped';
      gestureSub.textContent = 'Click Start Camera to resume';
      gestureEmoji.textContent = '✋';
      confBar.style.width = '0%';
      confPct.textContent = '—';
      statusText.textContent = 'Stopped · click Start Camera to begin again';
      statusDot.className = 'status-indicator';
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('detected'));
      lastGesture = null;
    }

    startBtn.addEventListener('click', startCamera);
    stopBtn.addEventListener('click', stopCamera);
  </script>
</body>
</html>
